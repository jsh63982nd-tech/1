name: Build Android APK

on:
  workflow_dispatch:
  push:
    paths:
      - "android-app/**"
      - ".github/workflows/android-apk.yml"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: android-actions/setup-android@v3
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.10.2"
      - name: Build debug APK
        working-directory: android-app
        run: gradle assembleDebug
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: power-exam-review-debug-apk
          path: android-app/app/build/outputs/apk/debug/app-debug.apk
      - name: Commit APK for direct download
        run: |
          mkdir -p apk
          cp android-app/app/build/outputs/apk/debug/app-debug.apk apk/power-exam-review-debug.apk
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add apk/power-exam-review-debug.apk
          git commit -m "Build Android debug APK" || exit 0
          git push
